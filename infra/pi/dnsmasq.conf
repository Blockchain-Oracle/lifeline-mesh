# Lifeline Mesh — DHCP for the LifelineMesh access point.
# Installed to /etc/dnsmasq.d/lifeline.conf by infra/pi/install.sh.

interface=wlan0
dhcp-range=192.168.42.10,192.168.42.100,255.255.255.0,24h
# Resolve the box's hostname on the AP subnet (mDNS also advertises lifeline.local).
address=/lifeline.local/192.168.42.1
domain=lifeline
