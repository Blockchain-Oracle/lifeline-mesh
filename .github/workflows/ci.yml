name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json "packageManager" (do not also set
      # `version:` here — action-setup errors on a double specification).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: workspace packages resolve cross-imports (@lifeline/*) via their
      # built dist + .d.ts, which typecheck and vitest both need.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: 400-line SLOC guard
        run: pnpm lint:sloc

      - name: Test
        run: pnpm test

      - name: Schema check
        run: pnpm schema:check
